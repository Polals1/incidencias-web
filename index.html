<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Incidencias</title>

    <style>
        body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
        .container { background:white; padding:20px; border-radius:8px; max-width:1400px; margin:auto; }
        table { width:100%; border-collapse:collapse; font-size:.9rem; margin-top:20px; }
        th, td { border:1px solid #ccc; padding:8px; }
        th { background:#007bff; color:white; }

        /* ESTADOS DINÁMICOS */
        .estado {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            display: inline-block;
        }

        /* Colores automáticos según texto */
        .estado-URGENTE { background:#d9534f; }
        .estado-FINALIZADO { background:#28a745; }
        .estado-FACTURABLE { background:#0275d8; }
        .estado-"INCIDENCIA CLIENTE" { background:#f0ad4e; color:black; }
        .estado-VACIO { background:#6c757d; }

        /* Estado por defecto */
        .estado-default { background:#999; }
    </style>
</head>
<body>

<div class="container">
    <h1>Seguimiento de Incidencias</h1>

    <table>
        <thead>
        <tr>
            <th>Código</th>
            <th>Proveedor</th>
            <th>Municipio</th>
            <th>Dirección</th>
            <th>Contacto</th>
            <th>Teléfono</th>
            <th>Trabajo</th>
            <th>Observación Serveo</th>
            <th>Urgencia</th>
            <th>Observación Proveedor</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tablaIncidencias"></tbody>
    </table>
</div>

<script>
// Cargar datos del JSON externo
fetch("datos.json")
    .then(r => r.json())
    .then(incidencias => renderTabla(incidencias));

function renderTabla(incidencias) {
    let tbody = document.getElementById("tablaIncidencias");
    tbody.innerHTML = "";

    incidencias.forEach(i => {
        let estado = i.estado || "VACIO";

        // normalizar para clase CSS
        let claseEstado = "estado-" + estado.replace(/ /g, "_").replace(/"/g,"");

        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${i.codigo}</td>
            <td>${i.proveedor}</td>
            <td>${i.municipio}</td>
            <td>${i.direccion}</td>
            <td>${i.contacto}</td>
            <td>${i.telefono}</td>
            <td>${i.trabajo}</td>
            <td>${i.obs_serveo || ""}</td>
            <td>${i.urgencia || ""}</td>
            <td>${i.obs_proveedor || ""}</td>
            <td><span class="estado ${claseEstado}">${estado}</span></td>
        `;

        tbody.appendChild(tr);
    });
}
</script>

</body>
</html>
