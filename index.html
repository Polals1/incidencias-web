<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Incidencias</title>

    <style>
        body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
        .container { background:white; padding:20px; border-radius:8px; max-width:1100px; margin:auto; }
        table { width:100%; border-collapse:collapse; font-size:.9rem; margin-top:20px; }
        th, td { border:1px solid #ccc; padding:8px; }
        th { background:#007bff; color:white; }
        .badge { padding:3px 6px; border-radius:4px; color:white; }
        .estado-abierta { background:#dc3545; }
        .estado-enprogreso { background:#ffc107; color:black; }
        .estado-resuelta { background:#28a745; }
    </style>
</head>
<body>

<div class="container">
    <h1>Seguimiento de Incidencias</h1>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Estado</th>
            <th>Prioridad</th>
            <th>Responsable</th>
            <th>Fecha apertura</th>
            <th>Fecha cierre</th>
            <th>Descripción</th>
        </tr>
        </thead>
        <tbody id="tablaIncidencias"></tbody>
    </table>
</div>

<script>
// Cargar datos del JSON externo
fetch("datos.json")
    .then(r => r.json())
    .then(incidencias => renderTabla(incidencias));

function renderTabla(incidencias) {
    let tbody = document.getElementById("tablaIncidencias");
    tbody.innerHTML = "";

    incidencias.forEach(i => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i.id}</td>
            <td>${i.titulo}</td>
            <td><span class="badge estado-${i.estado.toLowerCase().replace(" ","")}">${i.estado}</span></td>
            <td>${i.prioridad}</td>
            <td>${i.responsable}</td>
            <td>${i.fechaApertura || "-"}</td>
            <td>${i.fechaCierre || "-"}</td>
            <td>${i.descripcion}</td>
        `;
        tbody.appendChild(tr);
    });
}
</script>

</body>
</html>
